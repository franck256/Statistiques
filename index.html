<script>
    let quizQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let studentName = "";
    let isQuizActive = false; // Sécurité pour le rechargement de page

    // Nettoie la saisie pour comparer uniquement les valeurs numériques brutes
    function clean(str) {
        let cleanStr = str.trim().replace(/\s+/g, '').replace(',', '.').replace('%', '');
        // On convertit en nombre si possible pour éviter le piège "12" vs "12.0"
        const num = parseFloat(cleanStr);
        return isNaN(num) ? cleanStr : num.toString();
    }

    function formatFR(num) {
        return num.toString().replace('.', ',');
    }

    // Génère une série et s'assure qu'elle n'est pas déjà parfaitement triée
    function generateSerie(size, min, max) {
        let arr = [];
        for (let i = 0; i < size; i++) {
            arr.push(Math.floor(Math.random() * (max - min + 1)) + min);
        }
        // Si par hasard elle est triée, on la mélange
        const isSorted = arr.every((val, i, arr) => !i || val >= arr[i - 1]);
        if (isSorted && size > 2) {
            arr.sort(() => 0.5 - Math.random());
        }
        return arr;
    }

    function buildQuiz() {
        quizQuestions = [];

        const contexts = [
            "Notes obtenues par un groupe d'élèves lors d'un devoir :",
            "Températures relevées à midi dans une ville (°C) :",
            "Nombre d'heures passées sur les écrans par jour pour un groupe d'ados :",
            "Tailles mesurées sur de jeunes plants de tomates (en cm) :",
            "Nombre de paniers marqués par un joueur de basket lors de ses derniers matchs :"
        ];

        let pool = [
            "moyenne", "moyenne", 
            "moyenne_ponderee", "moyenne_ponderee",
            "mediane_impair", "mediane_pair", 
            "frequence", "frequence",
            "etendue", "etendue"
        ];
        pool = pool.sort(() => 0.5 - Math.random());

        for (let i = 0; i < 10; i++) {
            const type = pool[i];
            const context = contexts[Math.floor(Math.random() * contexts.length)];
            
            if (type === "moyenne") {
                const size = Math.floor(Math.random() * 4) + 5; 
                const serie = generateSerie(size, 8, 18);
                const sum = serie.reduce((a, b) => a + b, 0);
                const rawMoyenne = sum / size;
                // On stocke la valeur arrondie au dixième sous forme de nombre
                const roundedMoyenne = Math.round(rawMoyenne * 10) / 10;
                
                quizQuestions.push({
                    type: "Moyenne simple",
                    context: context,
                    isTable: false,
                    displaySerie: serie.join(" ; "),
                    consigne: "Calcule la moyenne de cette série. Arrondis au dixième si nécessaire.",
                    correctValue: formatFR(roundedMoyenne),
                    // Alternative sans le ".0" si l'arrondi tombe pile sur un entier
                    correctValueAlternative: formatFR(roundedMoyenne.toFixed(1)), 
                    explanation: `Somme = ${sum}, Effectif total = ${size}.<br>Calcul : ${sum} ÷ ${size} ≈ <strong>${formatFR(roundedMoyenne)}</strong>`
                });

            } else if (type === "moyenne_ponderee") {
                const numValues = Math.floor(Math.random() * 2) + 3; 
                let valeurs = [];
                while (valeurs.length < numValues) {
                    let val = Math.floor(Math.random() * 8) + 8; 
                    if (!valeurs.includes(val)) valeurs.push(val);
                }
                valeurs.sort((a, b) => a - b);
                
                let effectifs = [];
                for (let j = 0; j < numValues; j++) {
                    effectifs.push(Math.floor(Math.random() * 4) + 1); 
                }

                let sumProducts = 0;
                let totalEffectif = 0;
                let tableHTML = `<table class="stat-table"><tr><th>Valeur</th>`;
                valeurs.forEach(v => { tableHTML += `<td>${v}</td>`; });
                tableHTML += `</tr><tr><th>Effectif</th>`;
                effectifs.forEach((eff, idx) => { 
                    tableHTML += `<td>${eff}</td>`; 
                    sumProducts += valeurs[idx] * eff;
                    totalEffectif += eff;
                });
                tableHTML += `</tr></table>`;

                const rawMoyenne = sumProducts / totalEffectif;
                const roundedMoyenne = Math.round(rawMoyenne * 10) / 10;
                let detailsCalcul = valeurs.map((v, idx) => `(${v}×${effectifs[idx]})`).join(" + ");

                quizQuestions.push({
                    type: "Moyenne pondérée",
                    context: "Voici le tableau des effectifs d'une série statistique :",
                    isTable: true,
                    displaySerie: tableHTML,
                    consigne: "Calcule la moyenne pondérée de cette série. Arrondis au dixième si nécessaire.",
                    correctValue: formatFR(roundedMoyenne),
                    correctValueAlternative: formatFR(roundedMoyenne.toFixed(1)),
                    explanation: `Somme de la série = ${detailsCalcul} = ${sumProducts}.<br>Effectif total = ${totalEffectif}.<br>Calcul : ${sumProducts} ÷ ${totalEffectif} ≈ <strong>${formatFR(roundedMoyenne)}</strong>`
                });

            } else if (type === "mediane_impair") {
                const size = [5, 7, 9][Math.floor(Math.random() * 3)];
                const serie = generateSerie(size, 5, 20);
                const sorted = [...serie].sort((a, b) => a - b);
                const middleIndex = Math.floor(size / 2);
                const mediane = sorted[middleIndex];

                quizQuestions.push({
                    type: "Médiane (Effectif impair)",
                    context: context,
                    isTable: false,
                    displaySerie: serie.join(" ; "),
                    consigne: "Détermine la médiane de cette série.",
                    correctValue: mediane.toString(),
                    explanation: `Série ordonnée : ${sorted.join(" ≤ ")}.<br>L'effectif total est de ${size} (impair). La valeur centrale est la ${(middleIndex + 1)}ème, soit <strong>${mediane}</strong>.`
                });

            } else if (type === "mediane_pair") {
                const size = [6, 8][Math.floor(Math.random() * 2)];
                const serie = generateSerie(size, 6, 20);
                const sorted = [...serie].sort((a, b) => a - b);
                const m1 = sorted[(size / 2) - 1];
                const m2 = sorted[size / 2];
                const mediane = (m1 + m2) / 2;

                quizQuestions.push({
                    type: "Médiane (Effectif pair)",
                    context: context,
                    isTable: false,
                    displaySerie: serie.join(" ; "),
                    consigne: "Détermine la médiane de cette série.",
                    correctValue: formatFR(mediane),
                    explanation: `Série ordonnée : ${sorted.join(" ≤ ")}.<br>L'effectif total est de ${size} (pair). On fait la moyenne des deux valeurs centrales (${m1} et ${m2}) : (${m1} + ${m2}) ÷ 2 = <strong>${formatFR(mediane)}</strong>.`
                });

            } else if (type === "frequence") {
                const size = [8, 10, 12, 15][Math.floor(Math.random() * 4)];
                const serie = generateSerie(size, 10, 15);
                const target = serie[Math.floor(Math.random() * size)];
                const count = serie.filter(x => x === target).length;
                const rawFreq = (count / size) * 100;
                const freqRounded = Math.round(rawFreq);

                quizQuestions.push({
                    type: "Fréquence (%)",
                    context: context,
                    isTable: false,
                    displaySerie: serie.join(" ; "),
                    consigne: `Calcule la fréquence de la valeur [ ${target} ] dans cette série. Donne ta réponse en % (arrondie à l'unité).`,
                    correctValue: freqRounded.toString(),
                    explanation: `La valeur ${target} apparaît ${count} fois sur un effectif total de ${size}.<br>Calcul : (${count} ÷ ${size}) × 100 ≈ <strong>${freqRounded} %</strong>.`
                });

            } else if (type === "etendue") {
                const size = Math.floor(Math.random() * 4) + 5; 
                const serie = generateSerie(size, 3, 25);
                const minVal = Math.min(...serie);
                const maxVal = Math.max(...serie);
                const etendue = maxVal - minVal;

                quizQuestions.push({
                    type: "Étendue",
                    context: context,
                    isTable: false,
                    displaySerie: serie.join(" ; "),
                    consigne: "Calcule l'étendue de cette série statistique.",
                    correctValue: etendue.toString(),
                    explanation: `Valeur maximale = ${maxVal}, Valeur minimale = ${minVal}.<br>Calcul : ${maxVal} − ${minVal} = <strong>${etendue}</strong>.`
                });
            }
        }
    }

    function startTest() {
        const nameInput = document.getElementById("student-name").value.trim();
        if (nameInput === "") {
            alert("Veuillez entrer ton prénom et ton nom.");
            return;
        }
        studentName = nameInput;
        buildQuiz();
        isQuizActive = true;
        showPanel("panel-quiz");
        loadQuestion();
    }

    function showPanel(panelId) {
        document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
        document.getElementById(panelId).classList.add('active');
    }

    function loadQuestion() {
        if (currentIndex >= 10) {
            endTest();
            return;
        }

        const q = quizQuestions[currentIndex];
        document.getElementById("current-q").innerText = currentIndex + 1;
        document.getElementById("q-consigne").innerText = q.consigne;
        document.getElementById("q-context").innerText = q.context;
        
        const container = document.getElementById("q-values-container");
        if (q.isTable) {
            container.innerHTML = q.displaySerie;
        } else {
            container.innerHTML = `<div class="values-list">${q.displaySerie}</div>`;
        }
        
        document.getElementById("ans-value").value = "";
        document.getElementById("ans-value").focus();
        
        const progress = (currentIndex / 10) * 100;
        document.getElementById("progress-fill").style.width = progress + "%";
    }

    function submitAnswer() {
        const q = quizQuestions[currentIndex];
        const userAns = document.getElementById("ans-value").value;
        
        if (userAns.trim() === "") {
            alert("N'oublie pas d'entrer ta réponse.");
            return;
        }

        const cleanedUser = clean(userAns);
        const cleanedCorrect = clean(q.correctValue);
        
        let isCorrect = (cleanedUser === cleanedCorrect);
        
        if (!isCorrect && q.correctValueAlternative) {
            isCorrect = (cleanedUser === clean(q.correctValueAlternative));
        }

        q.savedDisplay = userAns.trim();
        q.isCorrect = isCorrect;
        
        if (isCorrect) score++;

        currentIndex++;
        loadQuestion();
    }

    function skipQuestion() {
        const q = quizQuestions[currentIndex];
        q.isCorrect = false;
        q.savedDisplay = "<span style='color:#64748b;'>Passée</span>";
        currentIndex++;
        loadQuestion();
    }

    function endTest() {
        isQuizActive = false;
        showPanel("panel-results");
        document.getElementById("res-name").innerText = studentName;
        document.getElementById("res-grade").innerText = `${score} / 10`;
        
        if (score >= 8) document.getElementById("res-grade").style.color = "#2ecc71";
        else if (score >= 5) document.getElementById("res-grade").style.color = "#e67e22";
        else document.getElementById("res-grade").style.color = "#e74c3c";

        const tableBody = document.getElementById("bilan-table-body");
        tableBody.innerHTML = ""; 

        quizQuestions.forEach(q => {
            const row = document.createElement("tr");
            row.className = q.isCorrect ? "row-correct" : "row-incorrect";

            const correctBadge = q.isCorrect 
                ? '<span class="badge badge-success">Juste !</span>' 
                : `<strong>Correction :</strong> ${formatFR(q.correctValue)}${q.type.includes("Fréquence") ? ' %' : ''}`;

            row.innerHTML = `
                <td><strong>${q.type}</strong></td>
                <td style="font-size:1.1em; color:#334155;">
                    <em>${q.context}</em><br>
                    ${q.isTable ? q.displaySerie : `<strong>${q.displaySerie}</strong>`}
                </td>
                <td style="font-size:1.2em; font-weight:bold;">${q.savedDisplay}</td>
                <td style="text-align:left; font-size:0.95em;">
                    <div style="margin-bottom:8px;">${correctBadge}</div>
                    <div style="border-top:1px dashed #cbd5e1; padding-top:5px; font-size:0.9em; color:#475569;">
                        ${q.explanation}
                    </div>
                </td>
            `;
            tableBody.appendChild(row);
        });
    }

    // Sécurité pour éviter de quitter l'évaluation en cours par erreur
    window.addEventListener("beforeunload", function (e) {
        if (isQuizActive) {
            e.preventDefault();
            e.returnValue = "Attention, si vous quittez cette page, votre progression sera perdue.";
        }
    });

    document.getElementById("ans-value").addEventListener("keyup", function(e) { 
        if (e.key === "Enter") submitAnswer(); 
    });
</script>
