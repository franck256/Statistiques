<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entraînement : Statistiques 3ème</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #2c3e50;
            max-width: 850px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            background: white;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            border-bottom: 4px solid #9b59b6;
            padding-bottom: 15px;
            margin-top: 0;
            font-size: 2.2em;
        }
        .step-panel {
            display: none;
        }
        .step-panel.active {
            display: block;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        input[type="text"] {
            border: 3px solid #bdc3c7;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #9b59b6;
        }
        
        .consigne {
            font-size: 1.3em;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 25px;
            text-align: center;
            line-height: 1.5;
            background: #f5f3f9;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #9b59b6;
        }
        
        /* ZONE D'AFFICHAGE DE LA SÉRIE */
        .serie-container {
            background: #f8fafc;
            padding: 25px;
            border-radius: 12px;
            border: 2px dashed #9b59b6;
            text-align: center;
            margin: 30px 0;
        }
        
        .serie-title {
            font-size: 1.1em;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .values-list {
            font-size: 2.2em;
            font-weight: bold;
            color: #2c3e50;
            letter-spacing: 2px;
        }
        
        /* ZONE DE RÉPONSE */
        .answer-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin: 30px 0;
        }
        .input-answer {
            width: 250px;
            height: 60px;
            font-size: 2em !important;
            font-weight: bold;
            text-align: center;
            border-width: 3px !important;
            border-color: #9b59b6 !important;
        }
        
        /* Boutons */
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        button.action-btn {
            flex: 1;
            padding: 16px;
            font-size: 1.2em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-start { background-color: #9b59b6; color: white; width: 100%; padding: 16px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.2em;}
        .btn-start:hover { background-color: #8e44ad; }
        .btn-submit { background-color: #2ecc71; color: white; }
        .btn-submit:hover { background-color: #27ae60; }
        .btn-skip { background-color: #94a3b8; color: white; }
        .btn-skip:hover { background-color: #64748b; }
        
        /* Progression */
        .progress-bar {
            background-color: #e2e8f0;
            border-radius: 6px;
            height: 12px;
            margin: 25px 0;
            overflow: hidden;
        }
        .progress-fill {
            background-color: #9b59b6;
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }
        .indicator {
            text-align: right;
            font-size: 1.1em;
            color: #64748b;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .result-box {
            background: #f8fafc;
            padding: 25px;
            border-radius: 8px;
            border-left: 6px solid #9b59b6;
            margin-top: 20px;
            font-size: 1.2em;
        }
        
        /* Tableau final */
        table.bilan {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 1.1em;
        }
        table.bilan th, table.bilan td {
            border: 1px solid #cbd5e1;
            padding: 14px;
            text-align: center;
        }
        table.bilan th {
            background-color: #f1f5f9;
            color: #1e293b;
        }
        .row-correct { background-color: #dcfce7; color: #14532d; }
        .row-incorrect { background-color: #fee2e2; color: #7f1d1d; }
        .badge {
            display: inline-block;
            padding: 6px 12px;
            font-weight: bold;
            border-radius: 6px;
            font-size: 0.9em;
        }
        .badge-success { background-color: #2ecc71; color: white; }
        
        /* Petite boîte d'aide théorique */
        .help-box {
            background-color: #eef2f7;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.95em;
            color: #475569;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <h1>Entraînement : Statistiques (Niveau 3ème)</h1>

    <!-- ÉTAPE 1 : Inscription -->
    <div id="panel-login" class="step-panel active">
        <label for="student-name">Prénom et Nom de l'élève :</label>
        <div style="margin-bottom: 20px;">
            <input type="text" id="student-name" style="width:100%; height:50px; font-size:1.2em; padding:10px; box-sizing:border-box;" placeholder="Ex: Chloé Dubois">
        </div>
        <button class="btn-start" onclick="startTest()">Commencer l'entraînement (10 questions)</button>
    </div>

    <!-- ÉTAPE 2 : Exercices -->
    <div id="panel-quiz" class="step-panel">
        <div class="indicator">Question <span id="current-q">1</span> / 10</div>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        
        <div class="consigne" id="q-consigne">...</div>
        
        <div class="serie-container">
            <div class="serie-title" id="q-context">Voici la série statistique :</div>
            <div class="values-list" id="q-values">12 ; 15 ; 8 ; 19</div>
        </div>
        
        <div class="answer-zone">
            <label id="label-reponse" for="ans-value" style="font-size: 1.2em;">Écris ta réponse ci-dessous :</label>
            <input type="text" id="ans-value" class="input-answer" autocomplete="off">
            <div class="help-box" id="q-help">Aide de format de réponse</div>
        </div>
        
        <div class="btn-group">
            <button class="action-btn btn-skip" onclick="skipQuestion()">Passer</button>
            <button class="action-btn btn-submit" onclick="submitAnswer()">Valider la réponse</button>
        </div>
    </div>

    <!-- ÉTAPE 3 : Bilan -->
    <div id="panel-results" class="step-panel">
        <div class="result-box">
            <p><strong>Élève :</strong> <span id="res-name">...</span></p>
            <p><strong>Score :</strong> <span id="res-grade" style="font-size: 2.5em; color: #27ae60; font-weight: bold;">0 / 10</span></p>
        </div>

        <h3 style="margin-top:30px; color:#2c3e50; border-bottom:3px solid #cbd5e1; padding-bottom:8px; font-size:1.4em;">Correction détaillée</h3>
        <table class="bilan">
            <thead>
                <tr>
                    <th>Type de calcul</th>
                    <th>Série statistique</th>
                    <th>Ta réponse</th>
                    <th>Correction / Méthode</th>
                </tr>
            </thead>
            <tbody id="bilan-table-body">
            </tbody>
        </table>

        <button class="btn-start" style="margin-top: 40px;" onclick="location.reload()">Refaire un autre test</button>
    </div>

    <script>
        let quizQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let studentName = "";

        // Nettoie la saisie : remplace le point par une virgule, enlève les espaces et les symboles "%"
        function clean(str) {
            return str.trim().replace(/\s+/g, '').replace('.', ',').replace('%', '');
        }

        function formatFR(num) {
            return num.toString().replace('.', ',');
        }

        // Génère une série de nombres aléatoires
        // size : longueur de la série
        // min/max : valeurs minimales et maximales
        function generateSerie(size, min, max) {
            let arr = [];
            for (let i = 0; i < size; i++) {
                arr.push(Math.floor(Math.random() * (max - min + 1)) + min);
            }
            return arr;
        }

        function buildQuiz() {
            quizQuestions = [];

            // Banques de contextes pour rendre les exercices plus vivants
            const contexts = [
                "Notes obtenues par un groupe d'élèves lors d'un devoir :",
                "Températures relevées à midi dans une ville (°C) :",
                "Nombre d'heures passées sur les écrans par jour pour un groupe d'ados :",
                "Tailles mesurées sur de jeunes plants de tomates (en cm) :",
                "Nombre de paniers marqués par un joueur de basket lors de ses derniers matchs :"
            ];

            const questionTypes = ["moyenne", "mediane_impair", "mediane_pair", "frequence"];
            
            // On veut un mix équilibré sur les 10 questions
            let pool = [
                "moyenne", "moyenne", "moyenne", 
                "mediane_impair", "mediane_impair", 
                "mediane_pair", "mediane_pair", 
                "frequence", "frequence", "frequence"
            ];
            pool = pool.sort(() => 0.5 - Math.random()); // Mélange des types de questions

            for (let i = 0; i < 10; i++) {
                const type = pool[i];
                const context = contexts[Math.floor(Math.random() * contexts.length)];
                
                if (type === "moyenne") {
                    // Effectif entre 5 et 8
                    const size = Math.floor(Math.random() * 4) + 5;
                    const serie = generateSerie(size, 8, 18);
                    const sum = serie.reduce((a, b) => a + b, 0);
                    // Arrondi au dixième
                    const rawMoyenne = sum / size;
                    const exactValue = (Math.round(rawMoyenne * 10) / 10).toFixed(1);
                    
                    quizQuestions.push({
                        type: "Moyenne",
                        context: context,
                        serie: [...serie],
                        displaySerie: serie.join(" ; "),
                        consigne: "Calcule la moyenne de cette série statistique. Arrondis le résultat au dixième si nécessaire.",
                        helpText: "Aide : Calcule la somme de toutes les valeurs, puis divise par l'effectif total.",
                        correctValue: formatFR(parseFloat(exactValue)), // gère aussi les valeurs entières sans .0 si l'élève tape juste l'entier
                        correctValueAlternative: formatFR(Math.round(rawMoyenne * 10) / 10).toString(),
                        explanation: `Somme = ${sum}, Effectif total = ${size}. <br><strong>${sum} ÷ ${size} ≈ ${formatFR(exactValue)}</strong>`
                    });

                } else if (type === "mediane_impair") {
                    // Effectif IMPAIR (5, 7 ou 9)
                    const size = [5, 7, 9][Math.floor(Math.random() * 3)];
                    const serie = generateSerie(size, 5, 20);
                    
                    // Tri pour trouver la médiane
                    const sorted = [...serie].sort((a, b) => a - b);
                    const middleIndex = Math.floor(size / 2);
                    const mediane = sorted[middleIndex];

                    quizQuestions.push({
                        type: "Médiane (Effectif impair)",
                        context: context,
                        serie: [...serie],
                        displaySerie: serie.join(" ; "),
                        consigne: "Détermine la médiane de cette série statistique.",
                        helpText: "Aide : Pense à ranger la série dans l'ordre croissant en premier ! L'effectif étant impair, la médiane est la valeur centrale.",
                        correctValue: mediane.toString(),
                        explanation: `Série ordonnée : ${sorted.join(" ≤ ")}. <br>L'effectif total est de ${size} (impair). La valeur centrale est la ${(middleIndex + 1)}ème, soit <strong>${mediane}</strong>.`
                    });

                } else if (type === "mediane_pair") {
                    // Effectif PAIR (6 ou 8)
                    const size = [6, 8][Math.floor(Math.random() * 2)];
                    const serie = generateSerie(size, 6, 20);
                    
                    // Tri pour trouver la médiane
                    const sorted = [...serie].sort((a, b) => a - b);
                    const m1 = sorted[(size / 2) - 1];
                    const m2 = sorted[size / 2];
                    const mediane = (m1 + m2) / 2;

                    quizQuestions.push({
                        type: "Médiane (Effectif pair)",
                        context: context,
                        serie: [...serie],
                        displaySerie: serie.join(" ; "),
                        consigne: "Détermine la médiane de cette série statistique.",
                        helpText: "Aide : Range la série dans l'ordre croissant. L'effectif étant pair, calcule la moyenne entre les deux valeurs centrales.",
                        correctValue: formatFR(mediane),
                        explanation: `Série ordonnée : ${sorted.join(" ≤ ")}. <br>L'effectif est de ${size} (pair). On fait la moyenne des deux valeurs du milieu (${m1} et ${m2}) : <br><strong>(${m1} + ${m2}) ÷ 2 = ${formatFR(mediane)}</strong>.`
                    });

                } else if (type === "frequence") {
                    // Calculer la fréquence en % d'une valeur qui apparaît au moins une fois
                    const size = [8, 10, 12, 15][Math.floor(Math.random() * 4)];
                    const serie = generateSerie(size, 10, 15);
                    
                    // Choisir une cible présente dans la série
                    const target = serie[Math.floor(Math.random() * size)];
                    const count = serie.filter(x => x === target).length;
                    
                    const rawFreq = (count / size) * 100;
                    const freqRounded = Math.round(rawFreq); // Arrondi à l'unité en %

                    quizQuestions.push({
                        type: "Fréquence (%)",
                        context: context,
                        serie: [...serie],
                        displaySerie: serie.join(" ; "),
                        consigne: `Calcule la fréquence de la valeur [ ${target} ] dans cette série. Donne ta réponse en % (arrondie à l'unité).`,
                        helpText: "Aide : Calcule (Effectif de la valeur ÷ Effectif total) × 100. N'écris que le nombre ou ajoute le symbole % à la fin.",
                        correctValue: freqRounded.toString(),
                        explanation: `La valeur ${target} apparaît ${count} fois sur un effectif total de ${size}.<br>Fréquence : (${count} ÷ ${size}) × 100 ≈ <strong>${freqRounded} %</strong>.`
                    });
                }
            }
        }

        function startTest() {
            const nameInput = document.getElementById("student-name").value.trim();
            if (nameInput === "") {
                alert("Veuillez entrer votre prénom et votre nom.");
                return;
            }
            studentName = nameInput;
            buildQuiz();
            showPanel("panel-quiz");
            loadQuestion();
        }

        function showPanel(panelId) {
            document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(panelId).classList.add('active');
        }

        function loadQuestion() {
            if (currentIndex >= 10) {
                endTest();
                return;
            }

            const q = quizQuestions[currentIndex];
            document.getElementById("current-q").innerText = currentIndex + 1;
            document.getElementById("q-consigne").innerText = q.consigne;
            document.getElementById("q-context").innerText = q.context;
            document.getElementById("q-values").innerText = q.displaySerie;
            document.getElementById("q-help").innerText = q.helpText;
            
            document.getElementById("ans-value").value = "";
            document.getElementById("ans-value").focus();
            
            const progress = (currentIndex / 10) * 100;
            document.getElementById("progress-fill").style.width = progress + "%";
        }

        function submitAnswer() {
            const q = quizQuestions[currentIndex];
            const userAns = document.getElementById("ans-value").value;
            
            if (userAns.trim() === "") {
                alert("N'oublie pas d'entrer ta réponse.");
                return;
            }

            const cleanedUser = clean(userAns);
            const cleanedCorrect = clean(q.correctValue);
            
            let isCorrect = (cleanedUser === cleanedCorrect);
            
            // Vérification d'une alternative de format (ex: si l'élève a mis 14 au lieu de 14,0)
            if (!isCorrect && q.correctValueAlternative) {
                isCorrect = (cleanedUser === clean(q.correctValueAlternative));
            }

            q.savedDisplay = userAns.trim();
            q.isCorrect = isCorrect;
            
            if (isCorrect) score++;

            currentIndex++;
            loadQuestion();
        }

        function skipQuestion() {
            const q = quizQuestions[currentIndex];
            q.isCorrect = false;
            q.savedDisplay = "<span style='color:#64748b;'>Passée</span>";
            currentIndex++;
            loadQuestion();
        }

        function endTest() {
            showPanel("panel-results");
            document.getElementById("res-name").innerText = studentName;
            document.getElementById("res-grade").innerText = `${score} / 10`;
            
            if (score >= 8) document.getElementById("res-grade").style.color = "#2ecc71";
            else if (score >= 5) document.getElementById("res-grade").style.color = "#e67e22";
            else document.getElementById("res-grade").style.color = "#e74c3c";

            const tableBody = document.getElementById("bilan-table-body");
            tableBody.innerHTML = ""; 

            quizQuestions.forEach(q => {
                const row = document.createElement("tr");
                row.className = q.isCorrect ? "row-correct" : "row-incorrect";

                const correctBadge = q.isCorrect 
                    ? '<span class="badge badge-success">Juste !</span>' 
                    : `<strong>Correction :</strong> ${formatFR(q.correctValue)}${q.type.includes("Fréquence") ? ' %' : ''}`;

                row.innerHTML = `
                    <td><strong>${q.type}</strong></td>
                    <td style="font-size:1.1em; color:#334155;">
                        <em>${q.context}</em><br>
                        <strong>${q.displaySerie}</strong>
                    </td>
                    <td style="font-size:1.2em; font-weight:bold;">${q.savedDisplay}</td>
                    <td style="text-align:left; font-size:0.95em;">
                        <div style="margin-bottom:8px;">${correctBadge}</div>
                        <div style="border-top:1px dashed #cbd5e1; padding-top:5px; font-size:0.9em; color:#475569;">
                            ${q.explanation}
                        </div>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        document.getElementById("ans-value").addEventListener("keyup", function(e) { 
            if (e.key === "Enter") submitAnswer(); 
        });
    </script>
</body>
</html>
